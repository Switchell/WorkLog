services:
  db:
    image: postgres:15
    container_name: axis_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: workday_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - axis_network

  admin:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    tty: true
    stdin_open: true
    container_name: axis_admin
    expose:
      - "8501"
    volumes:
      - ../src:/app
      - ../backups:/backups
    depends_on:
      - db
    env_file: ../.env
    networks:
      - axis_network

  grafana:
    image: grafana/grafana
    restart: unless-stopped
    container_name: axis_grafana
    ports:
      - "3001:3000"
    depends_on:
      - db
    networks:
      - axis_network

  client:
    build:
      context: ..
      dockerfile: docker/Dockerfile_client
    restart: unless-stopped
    container_name: axis_client
    expose:
      - "8501"
    volumes:
      - ../src:/app
    depends_on:
      - db
    env_file: ../.env
    networks:
      - axis_network

  nginx:
    image: nginx:latest
    container_name: axis_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_etc:/etc/letsencrypt
    depends_on:
      - admin
      - client
    networks:
      - axis_network

  certbot:
    image: certbot/certbot
    container_name: axis_certbot
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_etc:/etc/letsencrypt
      - certbot_var:/var/lib/letsencrypt
    depends_on:
      - nginx
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do sleep 6h; certbot renew; done'"

volumes:
  postgres_data:
  certbot_etc:
  certbot_var:

networks:
  axis_network:
    driver: bridge
