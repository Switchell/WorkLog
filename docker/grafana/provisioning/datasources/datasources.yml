# Переменные DB_* задаются в контейнере Grafana (docker-compose environment + .env).
# PostgreSQL в Docker-сети: хост = сервис db
apiVersion: 1
datasources:
  - name: AXIS PostgreSQL
    uid: postgres
    type: grafana-postgresql-datasource
    access: proxy
    url: db:5432
    database: ${DB_NAME}
    user: ${DB_USER}
    secureJsonData:
      password: ${DB_PASSWORD}
    jsonData:
      sslmode: disable
      postgresVersion: 1500
    isDefault: true
    editable: true
